name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish (single-file, self-contained)
        run: >
          dotnet publish -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HideIt
          path: publish/HideIt.exe

      - name: Generate SHA256SUMS
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $h = (Get-FileHash publish/HideIt.exe -Algorithm SHA256).Hash.ToLower()
          "$h  HideIt.exe" | Out-File publish/SHA256SUMS.txt -Encoding ascii -NoNewline

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/HideIt.exe
            publish/SHA256SUMS.txt
          generate_release_notes: true
